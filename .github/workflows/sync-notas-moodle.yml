name: Sincronización diaria de notas Moodle

on:
  schedule:
    - cron: '30 6 * * *'   # Todos los días a las 6:30am UTC (1:30am hora Perú)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizar notas desde Moodle
        run: |
          curl -s -X POST "${{ secrets.VERCEL_URL }}/api/admin/sync-notas" \
            -H "x-admin-key: ${{ secrets.ADMIN_SECRET_KEY }}" \
            --max-time 60 \
            -w "\nHTTP status: %{http_code}\n"
