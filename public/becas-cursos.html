<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJUCON — Cursos Online</title>
  <link rel="stylesheet" href="/assets/theme.css" />
  <script src="/assets/theme.js"></script>
  <style>
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; transition: var(--transition); }
    .back-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1.2rem; padding: 4px 8px; border-radius: var(--radius-sm); }
    .back-btn:hover { background: var(--surface2); }
    header h2 { font-size: 1rem; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    main { max-width: 780px; margin: 0 auto; padding: 32px 24px; }

    .hero { background: linear-gradient(135deg, #db2777, #ec4899); border-radius: var(--radius); padding: 28px; color: white; margin-bottom: 28px; }
    .hero h1 { font-size: 1.4rem; margin-bottom: 6px; }
    .hero p { font-size: .9rem; opacity: .9; line-height: 1.5; }

    /* Estado actual del curso */
    .curso-activo {
      background: var(--surface); border: 2px solid #db2777; border-radius: var(--radius);
      padding: 24px; margin-bottom: 28px; box-shadow: var(--shadow);
    }
    .curso-activo-label { font-size: .75rem; font-weight: 700; color: #db2777; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .curso-activo-nombre { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 16px; }
    .curso-meta { display: flex; gap: 20px; flex-wrap: wrap; font-size: .85rem; color: var(--text-muted); margin-bottom: 16px; }
    .nota-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-soft); color: var(--accent); padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: .9rem; }
    .estado-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-weight: 600; font-size: .85rem; }
    .estado-inscrito { background: #fef3c7; color: #b45309; }
    .estado-aprobado { background: #d1fae5; color: #065f46; }
    .estado-rechazado { background: #fee2e2; color: #991b1b; }
    [data-theme="dark"] .estado-inscrito { background: #451a03; color: #fcd34d; }
    [data-theme="dark"] .estado-aprobado { background: #064e3b; color: #6ee7b7; }
    [data-theme="dark"] .estado-rechazado { background: #450a0a; color: #fca5a5; }
    .btn-campus { display: inline-block; margin-top: 8px; padding: 10px 20px; background: #db2777; color: white; border-radius: var(--radius-sm); font-weight: 600; font-size: .9rem; text-decoration: none; }

    /* Historial */
    .historial-title { font-size: .8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin: 24px 0 12px; }

    /* Catálogo de cursos */
    .catalogo-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .catalogo-sub { font-size: .85rem; color: var(--text-muted); margin-bottom: 16px; }
    .curso-select {
      width: 100%; padding: 12px 16px;
      border: 2px solid var(--border); border-radius: 10px;
      font-size: .95rem; font-family: inherit;
      background: var(--surface2); color: var(--text);
      cursor: pointer; outline: none; transition: var(--transition);
    }
    .curso-select:focus { border-color: #db2777; }

    .inscribir-bar { margin-top: 18px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .btn-inscribir { padding: 12px 28px; background: #db2777; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .2s; }
    .btn-inscribir:hover { background: #be185d; }
    .btn-inscribir:disabled { background: var(--text-faint); cursor: default; }
    .sel-label { font-size: .88rem; color: var(--text-muted); }
    .sel-nombre { font-weight: 700; color: var(--text); }

    .msg { padding: 12px 16px; border-radius: var(--radius-sm); font-size: .9rem; margin-top: 16px; display: none; }
    .msg.ok { background: #d1fae5; color: #065f46; display: block; }
    .msg.err { background: #fee2e2; color: #991b1b; display: block; }
    [data-theme="dark"] .msg.ok { background: #064e3b; color: #6ee7b7; }
    [data-theme="dark"] .msg.err { background: #450a0a; color: #fca5a5; }

    #loading { text-align: center; padding: 48px; color: var(--text-faint); }
  </style>
</head>
<body>

<header>
  <button class="back-btn" onclick="window.location.href='/dashboard.html'">←</button>
  <h2>Cursos Online — Campus Virtual AJUCON</h2>
  <div class="user-chip">
    <span class="chip-grado" id="h-grado"></span>
    <div class="chip-avatar" id="h-avatar"></div>
    <span class="chip-nombre" id="h-nombre"></span>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>
    <button class="btn-salir" onclick="logout()">Salir</button>
  </div>
</header>

<main>
  <div class="hero">
    <h1>💻 Cursos Online AJUCON</h1>
    <p>Accede a cursos gratuitos para desarrollar habilidades personales, digitales y profesionales. Puedes llevar un curso a la vez.</p>
  </div>

  <div id="loading">Cargando tu información...</div>
  <div id="contenido" style="display:none"></div>
</main>

<script>
  const token = localStorage.getItem('ajucon_token');
  if (!token) window.location.href = '/index.html';

  (function() {
    const u = JSON.parse(localStorage.getItem('ajucon_user') || '{}');
    document.getElementById('h-grado').textContent = u.grado || '';
    document.getElementById('h-avatar').textContent = (u.nombre || '?')[0].toUpperCase();
    document.getElementById('h-nombre').textContent = (u.nombre || '').split(' ')[0] || '';
  })();

  function logout() {
    localStorage.removeItem('ajucon_token');
    localStorage.removeItem('ajucon_user');
    window.location.href = '/index.html';
  }

  let CURSOS = []; // se carga desde la API

  let cursoSeleccionado = null;

  function badgeEstado(estado) {
    const map = { inscrito: '📚 En curso', aprobado: '✅ Aprobado', rechazado: '❌ No aprobado' };
    return `<span class="estado-badge estado-${estado}">${map[estado] || estado}</span>`;
  }

  function renderCursoActivo(c) {
    const fechaInsc = new Date(c.created_at).toLocaleDateString('es-PE', { day:'2-digit', month:'long', year:'numeric' });
    return `
      <div class="curso-activo">
        <div class="curso-activo-label">Tu curso actual</div>
        <div class="curso-activo-nombre">${c.curso_nombre}</div>
        <div class="curso-meta">
          <span>📅 Inscrito el ${fechaInsc}</span>
          ${c.nota !== null && c.nota !== undefined ? `<span>${badgeEstado(c.estado)}</span>` : `<span>${badgeEstado(c.estado)}</span>`}
          ${c.nota !== null && c.nota !== undefined ? `<span class="nota-badge">🎯 ${c.nota.toFixed(0)}%</span>` : ''}
        </div>
        <a href="https://campus.ajucon.org.pe" target="_blank" class="btn-campus">Ir al Campus Virtual →</a>
      </div>`;
  }

  function renderHistorial(anteriores) {
    if (!anteriores.length) return '';
    const filas = anteriores.map(c => {
      const fecha = new Date(c.created_at).toLocaleDateString('es-PE', { day:'2-digit', month:'2-digit', year:'numeric' });
      return `<tr>
        <td style="padding:10px 12px;font-size:.88rem;color:var(--text)">${c.curso_nombre}</td>
        <td style="padding:10px 12px;font-size:.85rem;color:var(--text-muted)">${fecha}</td>
        <td style="padding:10px 12px">${badgeEstado(c.estado)}</td>
        <td style="padding:10px 12px;font-size:.88rem;color:var(--text-muted)">${c.nota !== null && c.nota !== undefined ? c.nota.toFixed(0) + '%' : '—'}</td>
      </tr>`;
    }).join('');
    return `
      <div class="historial-title">Cursos anteriores</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:28px">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="background:var(--surface2);font-size:.75rem;color:var(--text-muted);text-transform:uppercase">
            <th style="padding:10px 12px;text-align:left;font-weight:600">Curso</th>
            <th style="padding:10px 12px;text-align:left;font-weight:600">Fecha</th>
            <th style="padding:10px 12px;text-align:left;font-weight:600">Estado</th>
            <th style="padding:10px 12px;text-align:left;font-weight:600">Nota</th>
          </tr></thead>
          <tbody>${filas}</tbody>
        </table>
      </div>`;
  }

  let CONVENIOS = [];

  function renderCatalogo() {
    const opcionesCursos = CURSOS.map((c, i) =>
      `<option value="${c.id}">${i + 1}. ${c.nombre}</option>`).join('');
    const opcionesConvenios = CONVENIOS.map(c =>
      `<option value="${c.id}" data-contacto="${c.nombre_contacto || ''}" data-telefono="${c.telefono_contacto || ''}">${c.institucion}</option>`).join('');

    return `
      <div class="catalogo-title">Elige tu próximo curso</div>
      <div class="catalogo-sub">Selecciona tu institución, ingresa la clave de acceso y elige el curso.</div>

      <label style="font-size:.85rem;font-weight:600;color:var(--text-muted);display:block;margin-bottom:6px;margin-top:4px">Institución</label>
      <select class="curso-select" id="convenio-select" onchange="seleccionarConvenio(this)">
        <option value="">— Selecciona tu institución —</option>
        ${opcionesConvenios}
      </select>
      <p style="font-size:.82rem;color:var(--text-muted);margin-top:10px;line-height:1.5">
        Si tu institución no está en la lista porque no tiene convenio con AJUCON, pueden comunicarse al correo
        <a href="mailto:info@ajucon.org.pe" style="color:#db2777;font-weight:600">info@ajucon.org.pe</a>.
      </p>

      <div id="bloque-clave" style="display:none;margin-top:16px">
        <div id="glosa-convenio" style="background:#fef3c7;border:1px solid #fcd34d;border-radius:10px;padding:12px 16px;font-size:.85rem;color:#92400e;margin-bottom:14px;line-height:1.6"></div>
        <label style="font-size:.85rem;font-weight:600;color:var(--text-muted);display:block;margin-bottom:6px">Clave de acceso</label>
        <input type="password" id="clave-input" placeholder="Ingresa la clave de tu institución"
          style="width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:.95rem;background:var(--surface2);color:var(--text);box-sizing:border-box;outline:none;transition:border-color .2s"
          onfocus="this.style.borderColor='#db2777'" onblur="this.style.borderColor='var(--border)'"
          oninput="actualizarBoton()" />
      </div>

      <label style="font-size:.85rem;font-weight:600;color:var(--text-muted);display:block;margin-bottom:6px;margin-top:16px">Curso</label>
      <select class="curso-select" id="curso-select" onchange="seleccionarCurso(this)">
        <option value="">— Selecciona un curso —</option>
        ${opcionesCursos}
      </select>
      <div class="inscribir-bar">
        <button class="btn-inscribir" id="btn-inscribir" onclick="inscribirse()" disabled>Inscribirme</button>
      </div>
      <div class="msg" id="msg"></div>`;
  }

  function seleccionarConvenio(sel) {
    const opt = sel.options[sel.selectedIndex];
    const bloque = document.getElementById('bloque-clave');
    if (!sel.value) { bloque.style.display = 'none'; actualizarBoton(); return; }
    const contacto = opt.dataset.contacto;
    const telefono = opt.dataset.telefono;
    const institucion = opt.text;
    document.getElementById('glosa-convenio').innerHTML =
      `🔑 Si no dispones de la clave de acceso para tu institución <strong>${institucion}</strong>, comunícate con <strong>${contacto || 'el responsable'}</strong>${telefono ? ` al teléfono <strong>${telefono}</strong>` : ''}.`;
    bloque.style.display = 'block';
    actualizarBoton();
  }

  function seleccionarCurso(sel) {
    cursoSeleccionado = sel.value || null;
    actualizarBoton();
  }

  function actualizarBoton() {
    const convenio = document.getElementById('convenio-select')?.value;
    const clave = document.getElementById('clave-input')?.value?.trim();
    const btn = document.getElementById('btn-inscribir');
    if (btn) btn.disabled = !(convenio && clave && cursoSeleccionado);
  }

  async function inscribirse() {
    if (!cursoSeleccionado) return;
    const convenio_id = document.getElementById('convenio-select').value;
    const clave = document.getElementById('clave-input').value.trim();
    const btn = document.getElementById('btn-inscribir');
    const msg = document.getElementById('msg');
    btn.disabled = true;
    btn.textContent = 'Inscribiendo...';
    msg.className = 'msg';

    const r = await fetch('/api/cursos/inscribir', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ curso_id: cursoSeleccionado, convenio_id, clave }),
    });
    const data = await r.json();

    if (r.ok) {
      msg.className = 'msg ok';
      msg.textContent = data.mensaje;
      setTimeout(() => cargar(), 2000);
    } else {
      msg.className = 'msg err';
      msg.textContent = data.error || 'Error al inscribirse.';
      btn.disabled = false;
      btn.textContent = 'Inscribirme';
    }
  }

  async function cargar() {
    const contenido = document.getElementById('contenido');
    const loading = document.getElementById('loading');

    const [rCursos, rConvenios, r] = await Promise.all([
      fetch('/api/cursos/catalogo', { headers: { 'Authorization': 'Bearer ' + token } }),
      fetch('/api/convenios/activos'),
      fetch('/api/cursos/mi-curso', { headers: { 'Authorization': 'Bearer ' + token } }),
    ]);
    CURSOS = rCursos.ok ? await rCursos.json() : [];
    CONVENIOS = rConvenios.ok ? await rConvenios.json() : [];
    const data = await r.json();
    loading.style.display = 'none';
    contenido.style.display = 'block';

    const cursos = data.cursos || [];
    const activo = cursos.find(c => c.estado === 'inscrito');
    const anteriores = cursos.filter(c => c.estado !== 'inscrito');

    let html = '';
    if (activo) {
      html += renderCursoActivo(activo);
    }
    html += renderHistorial(anteriores);
    if (!activo) {
      html += renderCatalogo();
    }

    contenido.innerHTML = html;
  }

  cargar();
</script>
</body>
</html>
