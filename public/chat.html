<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJUCON — Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4ff; height: 100vh; display: flex; flex-direction: column; }

    header {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-btn {
      background: none; border: none; cursor: pointer;
      color: #64748b; font-size: 1.2rem; padding: 4px 8px;
      border-radius: 8px; transition: background .2s;
    }
    .back-btn:hover { background: #f1f5f9; }
    .agent-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }
    .agent-info h2 { font-size: 1rem; color: #1e293b; }
    .agent-info p { font-size: .8rem; color: #64748b; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; display: inline-block; margin-right: 4px;
    }

    /* Chat area */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.55;
      font-size: .95rem;
      white-space: pre-wrap;
    }
    .bubble.user {
      align-self: flex-end;
      background: #2563eb;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      align-self: flex-start;
      background: white;
      color: #1e293b;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .bubble.typing {
      align-self: flex-start;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      padding: 16px;
    }
    .typing-dots span {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #94a3b8;
      margin: 0 2px;
      animation: bounce .9s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input */
    .input-area {
      background: white;
      border-top: 1px solid #e2e8f0;
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: .95rem;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      transition: border-color .2s;
    }
    textarea:focus { border-color: #2563eb; }
    .send-btn {
      width: 44px; height: 44px;
      background: #2563eb;
      border: none; border-radius: 12px;
      color: white; font-size: 1.1rem;
      cursor: pointer; transition: background .2s;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #1d4ed8; }
    .send-btn:disabled { background: #94a3b8; cursor: default; }
  </style>
</head>
<body>

<header>
  <button class="back-btn" onclick="window.location.href='/dashboard.html'">←</button>
  <div class="agent-avatar" id="agent-avatar"></div>
  <div class="agent-info">
    <h2 id="agent-name"></h2>
    <p><span class="status-dot"></span>En línea</p>
  </div>
</header>

<div id="chat-area"></div>

<div class="input-area">
  <textarea id="msg-input" placeholder="Escribe tu mensaje..." rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
  const token = localStorage.getItem('ajucon_token');
  if (!token) window.location.href = '/index.html';

  const params = new URLSearchParams(window.location.search);
  const agente = params.get('agente') || 'psicologa';

  const config = {
    psicologa: {
      name: 'Psicóloga Vocacional',
      avatar: '🧠',
      color: '#7c3aed',
      bienvenida: '¡Hola! Soy tu psicóloga vocacional. Estoy aquí para ayudarte a descubrir tus intereses y orientarte sobre tu futuro. ¿Por dónde quieres empezar?',
      endpoint: '/api/chat/psicologa',
    },
    profesor: {
      name: 'Profesor Preuniversitario',
      avatar: '📚',
      color: '#0369a1',
      bienvenida: '¡Hola! Soy tu profesor de refuerzo. Puedo ayudarte con matemáticas, lenguaje, ciencias, historia y preparación para la PAES. ¿Qué materia necesitas repasar?',
      endpoint: '/api/chat/profesor',
    },
  };

  const cfg = config[agente];
  document.getElementById('agent-name').textContent = cfg.name;
  document.getElementById('agent-avatar').textContent = cfg.avatar;
  document.getElementById('agent-avatar').style.background = cfg.color + '22';

  let conversation_id = null;
  const chatArea = document.getElementById('chat-area');

  // Mensaje de bienvenida
  addBubble('assistant', cfg.bienvenida);

  function addBubble(role, text) {
    const div = document.createElement('div');
    div.className = 'bubble ' + role;
    div.textContent = text;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'bubble typing';
    div.id = 'typing';
    div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const btn = document.getElementById('send-btn');
    const mensaje = input.value.trim();
    if (!mensaje) return;

    input.value = '';
    input.style.height = 'auto';
    btn.disabled = true;

    addBubble('user', mensaje);
    showTyping();

    try {
      const r = await fetch(cfg.endpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token,
        },
        body: JSON.stringify({ mensaje, conversation_id }),
      });

      removeTyping();
      const data = await r.json();

      if (r.ok) {
        conversation_id = data.conversation_id;
        addBubble('assistant', data.respuesta);
      } else {
        addBubble('assistant', 'Hubo un error al procesar tu mensaje. Intenta de nuevo.');
      }
    } catch {
      removeTyping();
      addBubble('assistant', 'Error de conexión. Revisa tu red e intenta de nuevo.');
    }

    btn.disabled = false;
    input.focus();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
</script>
</body>
</html>
