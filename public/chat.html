<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJUCON — Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4ff; height: 100vh; display: flex; flex-direction: column; }

    header {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-btn { background: none; border: none; cursor: pointer; color: #64748b; font-size: 1.2rem; padding: 4px 8px; border-radius: 8px; }
    .back-btn:hover { background: #f1f5f9; }
    .agent-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .agent-info h2 { font-size: 1rem; color: #1e293b; }
    .agent-info p { font-size: .8rem; color: #64748b; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 4px; }

    /* Panel RIASEC — solo psicóloga */
    #riasec-panel {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 24px;
      display: none;
    }
    .riasec-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .riasec-label { font-size: .78rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .04em; }
    .riasec-pct { font-size: .85rem; font-weight: 800; color: #7c3aed; }
    .riasec-bar-wrap { background: #f1f5f9; border-radius: 8px; height: 8px; margin-bottom: 10px; }
    .riasec-bar-fill { height: 8px; border-radius: 8px; background: linear-gradient(90deg, #7c3aed, #a78bfa); transition: width .6s ease; }
    .riasec-dims {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }
    .dim-item { text-align: center; }
    .dim-name { font-size: .65rem; font-weight: 700; color: #94a3b8; }
    .dim-bar-wrap { background: #f1f5f9; border-radius: 4px; height: 28px; margin: 3px 0; position: relative; overflow: hidden; }
    .dim-bar-fill { position: absolute; bottom: 0; left: 0; right: 0; border-radius: 4px 4px 0 0; transition: height .6s ease; }
    .dim-score { font-size: .65rem; color: #64748b; font-weight: 600; }

    /* Chat area */
    #chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }

    .bubble { max-width: 72%; padding: 12px 16px; border-radius: 16px; line-height: 1.55; font-size: .95rem; white-space: pre-wrap; }
    .bubble.user { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 4px; }
    .bubble.assistant { align-self: flex-start; background: white; color: #1e293b; border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .bubble.typing { align-self: flex-start; background: white; box-shadow: 0 2px 8px rgba(0,0,0,.06); padding: 16px; }
    .typing-dots span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; margin: 0 2px; animation: bounce .9s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* Input */
    .input-area { background: white; border-top: 1px solid #e2e8f0; padding: 16px 24px; display: flex; gap: 12px; align-items: flex-end; }
    textarea { flex: 1; border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px 16px; font-size: .95rem; font-family: inherit; resize: none; outline: none; max-height: 120px; transition: border-color .2s; }
    textarea:focus { border-color: #2563eb; }
    .send-btn { width: 44px; height: 44px; background: #2563eb; border: none; border-radius: 12px; color: white; font-size: 1.1rem; cursor: pointer; transition: background .2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .send-btn:hover { background: #1d4ed8; }
    .send-btn:disabled { background: #94a3b8; cursor: default; }
  </style>
</head>
<body>

<header>
  <button class="back-btn" onclick="window.location.href='/dashboard.html'">←</button>
  <div class="agent-avatar" id="agent-avatar"></div>
  <div class="agent-info">
    <h2 id="agent-name"></h2>
    <p><span class="status-dot"></span>En línea</p>
  </div>
</header>

<!-- Panel RIASEC (solo psicóloga) -->
<div id="riasec-panel">
  <div class="riasec-header">
    <span class="riasec-label">Perfil vocacional detectado</span>
    <span class="riasec-pct" id="riasec-pct">0%</span>
  </div>
  <div class="riasec-bar-wrap">
    <div class="riasec-bar-fill" id="riasec-bar" style="width:0%"></div>
  </div>
  <div class="riasec-dims">
    <div class="dim-item">
      <div class="dim-name">R</div>
      <div class="dim-bar-wrap"><div class="dim-bar-fill" id="dim-R" style="height:0%;background:#f59e0b"></div></div>
      <div class="dim-score" id="score-R">0</div>
    </div>
    <div class="dim-item">
      <div class="dim-name">I</div>
      <div class="dim-bar-wrap"><div class="dim-bar-fill" id="dim-I" style="height:0%;background:#3b82f6"></div></div>
      <div class="dim-score" id="score-I">0</div>
    </div>
    <div class="dim-item">
      <div class="dim-name">A</div>
      <div class="dim-bar-wrap"><div class="dim-bar-fill" id="dim-A" style="height:0%;background:#ec4899"></div></div>
      <div class="dim-score" id="score-A">0</div>
    </div>
    <div class="dim-item">
      <div class="dim-name">S</div>
      <div class="dim-bar-wrap"><div class="dim-bar-fill" id="dim-S" style="height:0%;background:#22c55e"></div></div>
      <div class="dim-score" id="score-S">0</div>
    </div>
    <div class="dim-item">
      <div class="dim-name">E</div>
      <div class="dim-bar-wrap"><div class="dim-bar-fill" id="dim-E" style="height:0%;background:#f97316"></div></div>
      <div class="dim-score" id="score-E">0</div>
    </div>
    <div class="dim-item">
      <div class="dim-name">C</div>
      <div class="dim-bar-wrap"><div class="dim-bar-fill" id="dim-C" style="height:0%;background:#8b5cf6"></div></div>
      <div class="dim-score" id="score-C">0</div>
    </div>
  </div>
</div>

<div id="chat-area"></div>

<div class="input-area">
  <textarea id="msg-input" placeholder="Escribe tu mensaje..." rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
  const token = localStorage.getItem('ajucon_token');
  if (!token) window.location.href = '/index.html';

  const params = new URLSearchParams(window.location.search);
  const agente = params.get('agente') || 'psicologa';

  const config = {
    psicologa: {
      name: 'Valeria — Psicóloga Vocacional',
      avatar: '🧠',
      color: '#7c3aed',
      bienvenida: '¡Hola! Soy Valeria, tu psicóloga vocacional de AJUCON. Estoy aquí para acompañarte a descubrir tu vocación y orientarte sobre tu futuro en Perú.\n\n¿Me cuentas tu nombre y en qué año de secundaria estás?',
      endpoint: '/api/chat/psicologa',
    },
    profesor: {
      name: 'Profesor Carlos — Preuniversitario',
      avatar: '📚',
      color: '#0369a1',
      bienvenida: '¡Hola! Soy el profesor Carlos. Puedo ayudarte con matemáticas, comunicación, ciencias, historia y prepararte para el examen de admisión. ¿Qué necesitas repasar hoy?',
      endpoint: '/api/chat/profesor',
    },
  };

  const cfg = config[agente];
  document.getElementById('agent-name').textContent = cfg.name;
  document.getElementById('agent-avatar').textContent = cfg.avatar;
  document.getElementById('agent-avatar').style.background = cfg.color + '22';

  // Mostrar panel RIASEC solo para psicóloga
  if (agente === 'psicologa') {
    document.getElementById('riasec-panel').style.display = 'block';
  }

  let conversation_id = null;
  const chatArea = document.getElementById('chat-area');

  addBubble('assistant', cfg.bienvenida);

  function updateRiasec(perfil) {
    if (!perfil || agente !== 'psicologa') return;
    const pct = perfil.completitud || 0;
    document.getElementById('riasec-pct').textContent = pct + '%';
    document.getElementById('riasec-bar').style.width = pct + '%';
    ['R','I','A','S','E','C'].forEach(d => {
      const val = Math.min(perfil[d] || 0, 10);
      document.getElementById('dim-' + d).style.height = (val * 10) + '%';
      document.getElementById('score-' + d).textContent = perfil[d] || 0;
    });
  }

  function addBubble(role, text) {
    const div = document.createElement('div');
    div.className = 'bubble ' + role;
    div.textContent = text;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'bubble typing';
    div.id = 'typing';
    div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() { document.getElementById('typing')?.remove(); }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const btn = document.getElementById('send-btn');
    const mensaje = input.value.trim();
    if (!mensaje) return;

    input.value = '';
    input.style.height = 'auto';
    btn.disabled = true;

    addBubble('user', mensaje);
    showTyping();

    try {
      const r = await fetch(cfg.endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ mensaje, conversation_id }),
      });

      removeTyping();
      const data = await r.json();

      if (r.ok) {
        conversation_id = data.conversation_id;
        addBubble('assistant', data.respuesta);
        updateRiasec(data.perfil);
      } else {
        addBubble('assistant', 'Hubo un error al procesar tu mensaje. Intenta de nuevo.');
      }
    } catch {
      removeTyping();
      addBubble('assistant', 'Error de conexión. Revisa tu red e intenta de nuevo.');
    }

    btn.disabled = false;
    input.focus();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
</script>
</body>
</html>
