<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJUCON — Plataforma Escolar</title>
  <link rel="stylesheet" href="/assets/theme.css" />
  <script src="/assets/theme.js"></script>
  <style>
    body { display: flex; align-items: center; justify-content: center; }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%; max-width: 420px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: var(--transition);
    }
    h1 { font-size: 2rem; color: var(--accent); margin-bottom: 4px; }
    .subtitle { color: var(--text-muted); margin-bottom: 32px; font-size: .95rem; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab {
      flex: 1; padding: 10px;
      border: 2px solid var(--border2);
      border-radius: var(--radius-sm);
      background: var(--surface2);
      cursor: pointer; font-size: .9rem;
      color: var(--text-muted);
      transition: var(--transition);
    }
    .tab.active { border-color: var(--accent); color: var(--accent); font-weight: 600; background: var(--accent-soft); }
    label { display: block; font-size: .85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
    input, select {
      width: 100%; padding: 12px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: .95rem; outline: none;
      background: var(--surface2);
      color: var(--text);
      transition: var(--transition);
      margin-bottom: 16px;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text-faint); }
    button[type=submit] {
      width: 100%; padding: 14px;
      background: var(--accent); color: white;
      border: none; border-radius: var(--radius-sm);
      font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    button[type=submit]:hover { background: var(--accent-hover); }
    .msg { margin-top: 16px; padding: 12px; border-radius: var(--radius-sm); font-size: .9rem; display: none; }
    .msg.ok { background: #dcfce7; color: #166534; display: block; }
    .msg.err { background: #fee2e2; color: #991b1b; display: block; }
    [data-theme="dark"] .msg.ok { background: #14532d; color: #86efac; }
    [data-theme="dark"] .msg.err { background: #450a0a; color: #fca5a5; }
    .code-group { display: none; }
    .theme-toggle {
      position: fixed; top: 16px; right: 16px;
      z-index: 10;
      box-shadow: var(--shadow);
    }
    .admin-link { font-size: .75rem; color: var(--text-faint); text-decoration: none; }
    .admin-link:hover { color: var(--text-muted); }
  </style>
</head>
<body>
<button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>
<div class="card">
  <h1>AJUCON</h1>
  <p class="subtitle">Plataforma de apoyo escolar</p>

  <div class="tabs">
    <button class="tab active" onclick="setTab('registro')">Registrarme</button>
    <button class="tab" onclick="setTab('login')">Ingresar</button>
  </div>

  <!-- Formulario registro -->
  <form id="form-registro" onsubmit="handleRegistro(event)">
    <div id="campos-registro">
      <label>Nombres</label>
      <input type="text" id="nombres" placeholder="Tus nombres" required />
      <label>Apellidos</label>
      <input type="text" id="apellidos" placeholder="Tus apellidos" required />
      <label>Email</label>
      <input type="email" id="email-reg" placeholder="tu@email.com" required />
      <label>Grado escolar</label>
      <select id="grado" required onchange="toggleColegio(this.value)">
        <option value="">Selecciona tu grado</option>
        <option>Secundaria - 1er Año</option>
        <option>Secundaria - 2do Año</option>
        <option>Secundaria - 3er Año</option>
        <option>Secundaria - 4to Año</option>
        <option>Secundaria - 5to Año</option>
        <option>Secundaria Completa</option>
        <option>Carrera Técnica Completa</option>
        <option>Carrera Universitaria Completa</option>
        <option>Maestría Completa</option>
        <option>Doctorado Completo</option>
      </select>
      <div id="campo-colegio" style="display:none">
        <label>Nombre del colegio</label>
        <input type="text" id="colegio" placeholder="Ej: I.E. Jorge Basadre Grohmann" />
      </div>
      <label>Ciudad de residencia</label>
      <select id="ciudad" required>
        <option value="">Selecciona tu región</option>
        <option>Amazonas</option>
        <option>Áncash</option>
        <option>Apurímac</option>
        <option>Arequipa</option>
        <option>Ayacucho</option>
        <option>Cajamarca</option>
        <option>Callao</option>
        <option>Cusco</option>
        <option>Huancavelica</option>
        <option>Huánuco</option>
        <option>Ica</option>
        <option>Junín</option>
        <option>La Libertad</option>
        <option>Lambayeque</option>
        <option>Lima</option>
        <option>Loreto</option>
        <option>Madre de Dios</option>
        <option>Moquegua</option>
        <option>Pasco</option>
        <option>Piura</option>
        <option>Puno</option>
        <option>San Martín</option>
        <option>Tacna</option>
        <option>Tumbes</option>
        <option>Ucayali</option>
      </select>
      <button type="submit">Enviar código</button>
    </div>
    <div class="code-group" id="verify-reg">
      <label>Código de 6 dígitos</label>
      <input type="text" id="code-reg" maxlength="6" placeholder="123456" />
      <button type="button" onclick="handleVerify('reg')">Verificar</button>
    </div>
  </form>

  <!-- Formulario login -->
  <form id="form-login" style="display:none" onsubmit="handleLogin(event)">
    <div id="campos-login">
      <label>Email</label>
      <input type="email" id="email-login" placeholder="tu@email.com" required />
      <button type="submit">Enviar código</button>
    </div>
    <div class="code-group" id="verify-login">
      <label>Código de 6 dígitos</label>
      <input type="text" id="code-login" maxlength="6" placeholder="123456" />
      <button type="button" onclick="handleVerify('login')">Verificar</button>
    </div>
  </form>

  <div class="msg" id="msg"></div>
  <div style="text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
    <a href="/admin/login.html" class="admin-link">Acceso administrativo</a>
  </div>
</div>

<script>
  function toggleColegio(grado) {
    const campo = document.getElementById('campo-colegio');
    const input = document.getElementById('colegio');
    const esSecundaria = grado.includes('Secundaria');
    campo.style.display = esSecundaria ? 'block' : 'none';
    input.required = esSecundaria;
    if (!esSecundaria) input.value = '';
  }

  function setTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('form-registro').style.display = tab === 'registro' ? 'block' : 'none';
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    showMsg('');
  }

  function showMsg(text, type = '') {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg' + (type ? ' ' + type : '');
  }

  async function handleRegistro(e) {
    e.preventDefault();
    const grado = document.getElementById('grado').value;
    const body = {
      nombre: document.getElementById('nombres').value.trim(),
      apellido: document.getElementById('apellidos').value.trim(),
      email: document.getElementById('email-reg').value,
      grado,
      ciudad: document.getElementById('ciudad').value,
      colegio: grado.includes('Secundaria') ? document.getElementById('colegio').value : null,
    };
    const r = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await r.json();
    if (r.ok) {
      document.getElementById('campos-registro').style.display = 'none';
      document.getElementById('verify-reg').style.display = 'block';
      showMsg('Código enviado a tu email.', 'ok');
    } else {
      showMsg(data.error, 'err');
    }
  }

  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email-login').value;
    const r = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
    const data = await r.json();
    if (r.ok) {
      document.getElementById('campos-login').style.display = 'none';
      document.getElementById('verify-login').style.display = 'block';
      showMsg('Código enviado a tu email.', 'ok');
    } else {
      showMsg(data.error, 'err');
    }
  }

  async function handleVerify(mode) {
    const email = mode === 'reg'
      ? document.getElementById('email-reg').value
      : document.getElementById('email-login').value;
    const code = document.getElementById('code-' + mode).value;
    const r = await fetch('/api/auth/verify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, code }) });
    const data = await r.json();
    if (r.ok) {
      localStorage.setItem('ajucon_token', data.token);
      localStorage.setItem('ajucon_user', JSON.stringify(data.user));
      window.location.href = '/dashboard.html';
    } else {
      showMsg(data.error, 'err');
    }
  }
</script>
</body>
</html>
